<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Online - Bos Ferdi</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-section { background: #222; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; outline: none; }
        .btn-primary { width: 100%; padding: 12px; background: #0084ff; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #app-container { display: none; width: 100%; max-width: 500px; height: 95vh; background: #1e1e1e; flex-direction: column; border-radius: 15px; overflow: hidden; }
        header { background: #2d2d2d; padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #121212; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .me { align-self: flex-end; background: #0084ff; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: #333; border-bottom-left-radius: 4px; }
        .sender-name { font-size: 10px; color: #888; margin-bottom: 4px; display: block; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #2d2d2d; }
        .input-area input { margin: 0; flex: 1; }
        .btn-send { background: #0084ff; padding: 0 20px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-section">
        <h2 style="color:#0084ff">FakeBook Online</h2>
        <input type="text" id="userid" placeholder="ID (ferdi / user2)">
        <input type="password" id="userpass" placeholder="Password (123 / 456)">
        <button class="btn-primary" onclick="handleLogin()">Masuk Chat</button>
    </div>

    <div id="app-container">
        <header><span id="display-name" style="color:#0084ff">User</span></header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Tulis pesan...">
            <button class="btn-send" onclick="sendChat()">Kirim</button>
        </div>
    </div>

    <script>
        const CLIENT_ID = 'yjS79n7m6A98t6v7'; // ID Server Online
        let drone, room, currentUser;

        const users = [
            { id: "ferdi", pass: "123", name: "Bos Ferdi" },
            { id: "user2", pass: "456", name: "User Dua" }
        ];

        function handleLogin() {
            const id = document.getElementById('userid').value;
            const pass = document.getElementById('userpass').value;
            const user = users.find(u => u.id === id && u.pass === pass);
            
            if (user) {
                currentUser = user;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('display-name').innerText = currentUser.name;
                
                // MENGAKTIFKAN SERVER ONLINE
                drone = new ScaleDrone(CLIENT_ID, { data: { name: currentUser.name } });
                
                drone.on('open', error => {
                    if (error) return console.error(error);
                    room = drone.subscribe('observable-room-ferdi');
                    
                    room.on('data', (data, member) => {
                        const isMe = member.id === drone.clientId;
                        renderMessage(data.sender, data.text, isMe);
                    });
                });
            } else { alert("ID atau Password salah!"); }
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim() || !room) return;

            drone.publish({
                room: 'observable-room-ferdi',
                message: { sender: currentUser.name, text: input.value }
            });
            input.value = '';
        }

        function renderMessage(sender, text, isMe) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isMe ? 'me' : 'others'}`;
            msgDiv.innerHTML = `<span class="sender-name">${isMe ? 'Anda' : sender}</span>${text}`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendChat();
        });
    </script>
</body>
</html>
